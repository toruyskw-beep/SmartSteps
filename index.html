<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人成績入力 — 学習のようす診断システム</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <header>
    <div class="title-block">
      <h1>個人成績入力</h1>
      <div class="sub">学習のようす — 個人分析診断文 生成システム</div>
    </div>
    <div class="stamp">入力モード：単元別 ＋ 観点別<br>自動診断プレビュー連動</div>
    <div class="api-status" id="apiStatus">
      <span id="apiStatusIcon">⏳</span> AI設定確認中...
    </div>
  </header>

  <div class="layout">
    <!-- LEFT: form -->
    <div>
      <!-- 1. 児童・基本設定 -->
      <section class="card">
        <div class="card-head">
          <span class="num">1</span>
          <h2>児童・基本設定</h2>
          <span class="hint">ここの選択で下の入力項目が変わります</span>
        </div>
        <div class="card-body">
          <div class="grid cols-3">
            <label class="field">
              <span class="lbl">児童氏名</span>
              <input type="text" id="studentName" value="日本 太郎">
            </label>
            <label class="field">
              <span class="lbl">学年</span>
              <div class="selectwrap">
                <!-- options are built by script.js per subject's grade range -->
                <select id="grade"></select>
              </div>
            </label>
            <label class="field">
              <span class="lbl">学期制</span>
              <div class="selectwrap">
                <select id="termType">
                  <option value="3term" selected>3学期制</option>
                  <option value="2term">2学期制</option>
                  <option value="2termHK">2学期制（前期後期）</option>
                </select>
              </div>
            </label>
          </div>
          <div class="grid cols-3" style="margin-top:16px">
            <label class="field">
              <span class="lbl">教科</span>
              <div class="selectwrap">
                <!-- options are built by script.js from SUBJECTS -->
                <select id="subject"></select>
              </div>
            </label>
            <label class="field">
              <span class="lbl">対象学期</span>
              <div class="selectwrap">
                <select id="term"></select>
              </div>
            </label>
            <label class="field" id="junkyoField">
              <span class="lbl">使用教科書（準拠）</span>
              <div class="selectwrap">
                <select id="junkyo"></select>
              </div>
            </label>
          </div>
        </div>
      </section>

      <!-- 2. 観点別評価 -->
      <section class="card">
        <div class="card-head">
          <span class="num">2</span>
          <h2>観点別評価</h2>
          <span class="hint">観点別得点集計表より</span>
        </div>
        <div class="card-body">
          <p class="section-note" id="kantenNote"></p>
          <label class="field" style="margin-bottom:16px">
            <span class="lbl">総合評価（赤枠・総評に使用）</span>
            <div class="abc" id="sogoAbc">
              <button type="button" data-g="A">A</button>
              <button type="button" data-g="B">B</button>
              <button type="button" data-g="C">C</button>
            </div>
          </label>
          <table class="eval-table">
            <thead><tr><th>観点</th><th>評価</th></tr></thead>
            <tbody id="kantenRows"></tbody>
          </table>
        </div>
      </section>

      <!-- 3. 単元別評価 -->
      <section class="card" id="unitCard">
        <div class="card-head">
          <span class="num">3</span>
          <h2>単元別評価</h2>
          <span class="hint">単元別得点集計表より</span>
        </div>
        <div class="card-body">
          <p class="section-note" id="unitNote"></p>
          <table class="eval-table">
            <thead>
              <tr>
                <th>単元 ／ めあて</th>
                <th style="width:120px">評価</th>
              </tr>
            </thead>
            <tbody id="unitRows"></tbody>
          </table>
        </div>
      </section>

      <div class="actions">
        <button type="button" class="btn ghost">一時保存</button>
        <button type="button" class="btn primary" id="confirmBtn">診断文生成</button>
      </div>
    </div>

    <!-- RIGHT: 3方式プレビュー縦積み -->
    <aside class="preview-col">

      <!-- テンプレート版 -->
      <div class="card pv-card">
        <div class="pv-head">
          <span class="pv-icon">📋</span>
          <h2>テンプレート版</h2>
          <span class="live">即時生成</span>
        </div>
        <div id="pvBody-tmpl"></div>
        <div class="pv-foot" id="pvFoot-tmpl"></div>
      </div>

      <!-- 生成AI版 -->
      <div class="card pv-card">
        <div class="pv-head">
          <span class="pv-icon">🤖</span>
          <h2>生成AI版</h2>
          <span class="live ai-live">Gemini API</span>
        </div>
        <div id="pvBody-ai"></div>
        <div class="pv-foot" id="pvFoot-ai"></div>
      </div>

      <!-- RAG版 -->
      <div class="card pv-card">
        <div class="pv-head">
          <span class="pv-icon">🔍</span>
          <h2>RAG版</h2>
          <span class="live rag-live">RAG + Gemini API</span>
        </div>
        <div id="pvBody-rag"></div>
        <div class="pv-foot" id="pvFoot-rag"></div>
      </div>

    </aside>
  </div>
</div>

<script src="script.js"></script>
<script src="script-ai.js"></script>
<script src="script-rag.js"></script>
